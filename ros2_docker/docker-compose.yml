services:
  ros2:
    build: .
    image: mobile-robot-ros2:jazzy
    container_name: mobile_robot_ros2
    privileged: true
    network_mode: host
    devices:
      - /dev/i2c-1:/dev/i2c-1
      - /dev/video0:/dev/video0
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/ttyACM0:/dev/ttyACM0
    volumes:
      - ../mobile_robot_edge:/ros2_ws/src/mobile_robot_edge
      - ../mobile_robot_server:/ros2_ws/src/mobile_robot_server
      - ../edge_services:/edge_services
      - ./ros2_workspace:/ros2_ws
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    stdin_open: true
    tty: true
    command: /bin/bash
