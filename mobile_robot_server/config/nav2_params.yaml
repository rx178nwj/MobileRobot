# =============================================================================
# Nav2 parameters — differential-drive robot with monocular SLAM map
# =============================================================================
# 注意: SLAM 2.5D 構成
#       /scan を2D障害物入力、/lider/pointcloud2 を voxel_layer 入力として使用。
# =============================================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

# -----------------------------------------------------------------------------
# Controller: Regulated Pure Pursuit — 差動二輪に適したシンプルな追従制御
# -----------------------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance:  0.25   # ゴール到達判定: 25cm以内
      yaw_goal_tolerance: 0.25   # ゴール到達判定: ~14度以内

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel:       0.25    # 通常走行速度 (m/s)
      lookahead_dist:           0.6     # 前方参照距離 (m)
      min_lookahead_dist:       0.3
      max_lookahead_dist:       0.9
      lookahead_time:           1.5
      rotate_to_heading_angular_vel: 0.5
      transform_tolerance:      0.1
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection:  true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_rotate_to_heading:    true
      allow_reversing:          false
      rotate_to_heading_min_angle: 0.785  # 45度以上の方向転換は回転してから前進
      max_angular_accel:        1.0

# -----------------------------------------------------------------------------
# Local Costmap — 2D Laser + 2.5D PointCloud2
# -----------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width:      3      # ローカルマップ幅 (m)
      height:     3      # ローカルマップ高さ (m)
      resolution: 0.05   # 5cm
      robot_radius: 0.15 # ロボット半径 (m) — 衝突判定に使用
      plugins: ["obstacle_layer", "voxel_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15  # filter LiDAR self-reflections from robot chassis
          obstacle_max_range: 8.0
          obstacle_min_range: 0.15  # filter LiDAR self-reflections from robot chassis
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 12
        max_obstacle_height: 1.2
        mark_threshold: 0
        unknown_threshold: 12
        observation_sources: lider_points
        lider_points:
          topic: /lider/pointcloud2
          data_type: "PointCloud2"
          marking: true
          clearing: true
          obstacle_range: 6.0
          raytrace_range: 8.0
          min_obstacle_height: -0.20
          max_obstacle_height: 1.20
          observation_persistence: 0.0
          expected_update_rate: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: true

# -----------------------------------------------------------------------------
# Global Costmap — RTAB-Mapの/mapを使用
# -----------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.15
      resolution: 0.05
      track_unknown_space: true   # 未探索領域を通行可能として扱う
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        map_topic: /map             # ← RTAB-Mapが配信するマップトピック
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: true

# -----------------------------------------------------------------------------
# Planner: NavFn — A*ベースのグローバルパスプランナー
# -----------------------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance:     0.5
      use_astar:     true    # A* (false=Dijkstra)
      allow_unknown: true    # 未探索領域への経路計画を許可

# -----------------------------------------------------------------------------
# Smoother
# -----------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# -----------------------------------------------------------------------------
# Behavior Server — 回復行動 (スタック時の回転・後退)
# -----------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic:  local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic:  local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame:  odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel:  0.5
    min_rotational_vel:  0.4
    rotational_acc_lim:  1.0

# -----------------------------------------------------------------------------
# Velocity Smoother — 急激な速度変化を平滑化
# -----------------------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.30, 0.0, 1.0]   # [vx, vy, vtheta] m/s, rad/s
    min_velocity: [-0.10, 0.0, -1.0]
    max_accel:    [0.5, 0.0, 1.0]
    max_decel:    [-0.5, 0.0, -1.0]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# -----------------------------------------------------------------------------
# Collision Monitor — /scan による緊急停止
# -----------------------------------------------------------------------------
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: cmd_vel_smoothed
    cmd_vel_out_topic: cmd_vel
    transform_tolerance: 0.5
    source_timeout: 2.0
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      points: "[[0.35, 0.25], [0.35, -0.25], [-0.2, -0.25], [-0.2, 0.25]]"
      action_type: "stop"
      max_points: 3
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      min_range: 0.15  # filter out LiDAR self-reflections from robot chassis
      enabled: true

# -----------------------------------------------------------------------------
# Lifecycle Manager — 上記ノードのライフサイクル管理
# navigation_launch.py が使うノード名は lifecycle_manager_navigation
# collision_monitor は LiDARなしのため除外
# -----------------------------------------------------------------------------
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - velocity_smoother


# -----------------------------------------------------------------------------
# Route Server (Nav2 Jazzy)
# -----------------------------------------------------------------------------
route_server:
  ros__parameters:
    use_sim_time: false

# -----------------------------------------------------------------------------
# Waypoint Follower
# -----------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200
